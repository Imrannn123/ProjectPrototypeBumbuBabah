<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Staff Panel</title>

<style>

*{
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}


body{
margin:0;
background:#f5f6fa;
color:#222;
}



header{

height:75px;

background:linear-gradient(135deg,#111,#333);

color:white;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
font-weight:700;

box-shadow:0 8px 25px #ccc;

}



.nav{

background:white;

padding:20px;

display:flex;

justify-content:center;

gap:15px;

position:sticky;
top:0;

}



.nav button{

padding:12px 25px;

border:none;

border-radius:20px;

background:#111;

color:white;

cursor:pointer;

}



.nav button:hover{

background:#ff5a1f;

}



.container{

padding:30px;

display:grid;

grid-template-columns:1fr 1fr;

gap:25px;

}



.box{

background:white;

padding:25px;

border-radius:25px;

box-shadow:0 15px 35px #ddd;

}



.item{

background:#fafafa;

padding:18px;

margin:15px 0;

border-radius:15px;

border-left:5px solid #22c55e;

}



.menu-item{

border-left-color:#ff5a1f;

}



button.action{

width:100%;

padding:12px;

border:none;

border-radius:12px;

margin-top:10px;

cursor:pointer;

font-weight:bold;

}



.prepare{

background:#ff9800;
color:white;

}



.complete{

background:#22c55e;
color:white;

}



.status{

font-weight:bold;

color:#ff5a1f;

}



@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}

</style>


</head>


<body>


<header>

Bumbu Babah Staff Dashboard

</header>



<div class="nav">


<button onclick="scrollToSection('orders')">

Live Orders

</button>


<button onclick="scrollToSection('menu')">

Menu

</button>


<button onclick="location.href='admin.html'">

Admin Panel

</button>


</div>




<div class="container">


<!-- ORDERS -->


<div class="box" id="orders">


<h2>
Live Orders 🔴
</h2>


<div id="orderList">

</div>


</div>





<!-- MENU VIEW -->


<div class="box" id="menu">


<h2>
Restaurant Menu 🍛
</h2>


<div id="menuList">

</div>


</div>



</div>





<script>

if(localStorage.getItem("userRole") !== "staff"){

alert("Access denied!");

window.location.href="index.html";

}


function loadOrders(){


let orders =
JSON.parse(localStorage.getItem("orders")) || [];


let box =
document.getElementById("orderList");


box.innerHTML="";



if(orders.length==0){

box.innerHTML="<p>No orders yet</p>";

return;

}



orders.forEach((order,index)=>{


box.innerHTML += `


<div class="item">


<h3>

Customer:
${order.name}

</h3>



<p>

${order.items.map(i=>

"- "+i.name+" x"+i.qty

).join("<br>")}

</p>



<b>
Total RM${order.total}
</b>


<br><br>


Status:

<span class="status">

${order.status || "Pending"}

</span>




<button class="action prepare"

onclick="updateStatus(${index},'Preparing')">

Preparing

</button>




<button class="action complete"

onclick="updateStatus(${index},'Completed')">

Completed

</button>



</div>


`;


});

}




function updateStatus(index,status){


let orders =
JSON.parse(localStorage.getItem("orders"));


orders[index].status=status;


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


loadOrders();


}





function loadMenu(){


let menu =
JSON.parse(localStorage.getItem("menuData")) || [];



let box =
document.getElementById("menuList");


box.innerHTML="";



menu.forEach(item=>{


box.innerHTML += `


<div class="item menu-item">


<b>
${item.name}
</b>


<br>


Category:
${item.category}



<br>


Price:
RM${item.price}



</div>


`;

});


}





function scrollToSection(id){

document
.getElementById(id)
.scrollIntoView({

behavior:"smooth"

});

}





setInterval(()=>{

loadOrders();
loadMenu();

},2000);


loadOrders();

loadMenu();


</script>



</body>
</html>
