<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bumbu Babah Invoice</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }

    .invoice{
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .top{
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #eee;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }

    .logo{
      font-size: 32px;
      font-weight: bold;
    }

    .invoice-title{
      text-align: right;
    }

    .invoice-title h1{
      margin-bottom: 5px;
    }

    table{
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th,
    table td{
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    table th{
      background: #111;
      color: white;
    }

    .total-box{
      margin-top: 30px;
      text-align: right;
    }

    .total-box h2{
      color: green;
      font-size: 32px;
    }

    .customer{
      margin-top: 30px;
    }

    input{
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .buttons{
      margin-top: 30px;
      display: flex;
      gap: 15px;
    }

    button{
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .print-btn{
      background: black;
      color: white;
    }

    .back-btn{
      background: #ddd;
    }

    @media print {

      body{
        background: white;
        padding: 0;
      }

      .buttons,
      .customer{
        display: none;
      }

      .invoice{
        box-shadow: none;
        border-radius: 0;
      }

    }

  </style>
</head>

<body>

  <div class="invoice">

    <div class="top">

      <div class="logo">
        🍔 Bumbu Babah
      </div>

      <div class="invoice-title">
        <h1>INVOICE</h1>
        <p id="date"></p>
      </div>

    </div>

    <table>

      <thead>
        <tr>
          <th>Item</th>
          <th>Quantity</th>
          <th>Price</th>
          <th>Total</th>
        </tr>
      </thead>

      <tbody id="invoiceItems">

      </tbody>

    </table>

    <div class="total-box">
      <h2 id="grandTotal">RM0</h2>
    </div>

    <div class="customer">
      <h3>Customer Name</h3>

      <input type="text" placeholder="Enter customer name">
    </div>

    <div class="buttons">
      <button class="back-btn" onclick="goBack()">
        Back
      </button>

     <button class="print-btn" onclick="finishOrder()">
  Print Invoice
</button>
    </div>

  </div>

<script>

	function finishOrder(){

  // print dulu
  window.print();

  // lepas print baru clear cart
  setTimeout(() => {
    localStorage.removeItem("cart");
  }, 500);

}

  let order = JSON.parse(localStorage.getItem("lastOrder")) || null;

if(!order){
  document.body.innerHTML = "<h2>No order found</h2>";
}

  let invoiceItems = document.getElementById("invoiceItems");

let subtotal = 0;

order.items.forEach(item => {
  subtotal += item.price * item.qty;
});

let sst = subtotal * 0.06;
let grandTotal = subtotal + sst;

document.querySelector("input").value = order.name;
document.querySelector("input").disabled = true;

  // Add summary rows
  invoiceItems.innerHTML += `
    <tr>
      <td colspan="3" style="text-align:right;"><b>Subtotal</b></td>
      <td><b>RM${subtotal.toFixed(2)}</b></td>
    </tr>

    <tr>
      <td colspan="3" style="text-align:right;">
        <b>SST (6%)</b>
      </td>
      <td><b>RM${sst.toFixed(2)}</b></td>
    </tr>

    <tr>
      <td colspan="3" style="text-align:right; font-size:20px;">
        <b>Grand Total</b>
      </td>
      <td style="font-size:20px; color:green;">
        <b>RM${grandTotal.toFixed(2)}</b>
      </td>
    </tr>
  `;

  document.getElementById("grandTotal").innerText =
    "TOTAL: RM " + grandTotal.toFixed(2);
	
	/* CLEAR CART AUTO */
clearCart();

  document.getElementById("date").innerText =
    new Date().toLocaleString();

  function goBack(){
    window.location.href = "customer.html";
  }

</script>

</body>
</html>
