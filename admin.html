<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
*{
box-sizing:border-box;
font-family:'Segoe UI',Arial;
}

body{
margin:0;
background:#f5f6fa;
}

header{
height:75px;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

.nav{
background:white;
padding:20px;
display:flex;
justify-content:center;
gap:15px;
position:sticky;
top:0;
z-index: 100;
}

.nav button{
border:none;
background:#111;
color:white;
padding:12px 25px;
border-radius:20px;
cursor:pointer;
}

.nav button:hover{
background:#ff5a1f;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 15px 35px #ddd;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.stat{
background:#fafafa;
padding:25px;
border-radius:20px;
text-align:center;
}

.stat h1{
color:#ff5a1f;
}

/* ================= STYLE GRAF OFFLINE CSS ================= */
.chart-container {
margin-top: 30px;
background: #fafafa;
padding: 20px;
border-radius: 20px;
}

.chart-filters {
display: flex;
gap: 10px;
margin-bottom: 20px;
}

.chart-filters button {
background: #ddd;
border: none;
padding: 8px 15px;
border-radius: 15px;
cursor: pointer;
font-weight: bold;
color: #333;
}

.chart-filters button.active {
background: #ff5a1f;
color: white;
}

.chart-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.chart-box {
background: white;
padding: 20px;
border-radius: 15px;
box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.chart-title {
font-size: 16px;
font-weight: bold;
margin-bottom: 15px;
color: #333;
}

.custom-chart {
display: flex;
justify-content: space-around;
align-items: flex-end;
height: 200px;
border-bottom: 2px solid #ddd;
padding-top: 20px;
position: relative;
}

.bar-wrapper {
display: flex;
flex-direction: column;
align-items: center;
flex-grow: 1;
height: 100%;
justify-content: flex-end;
}

.bar {
width: 60%;
max-width: 40px;
background: #111;
border-radius: 5px 5px 0 0;
transition: height 0.5s ease;
position: relative;
cursor: pointer;
}

.bar:hover {
opacity: 0.8;
}

.bar-value {
position: absolute;
top: -22px;
left: 50%;
transform: translateX(-50%);
font-size: 11px;
font-weight: bold;
color: #333;
white-space: nowrap;
}

.bar-label {
font-size: 12px;
margin-top: 8px;
color: #666;
text-align: center;
}

.revenue-bar {
background: #ff5a1f !important;
}
/* ========================================================== */

.item{
background:#fafafa;
padding:15px;
border-radius:15px;
margin:10px 0;
border-left:5px solid #ff5a1f;
}

/* Style tambahan untuk susunan butang aksi menu */
.menu-actions {
margin-top: 10px;
display: flex;
gap: 10px;
}

.menu-actions button {
flex: 1;
padding: 8px;
border: none;
border-radius: 8px;
cursor: pointer;
font-weight: bold;
color: white;
}

.btn-edit { background: #007bff; }
.btn-save { background: #28a745; }
.btn-delete { background: #e53935; }

/* Input kecil di dalam list semasa mengedit */
.edit-input {
width: auto;
display: inline-block;
padding: 5px;
margin: 2px;
border-radius: 5px;
border: 1px solid #ccc;
font-size: 14px;
}

input{
width:100%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ddd;
}

button.action{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#111;
color:white;
cursor:pointer;
}

@media(max-width:900px){
.stats{
grid-template-columns:1fr;
}
.chart-grid {
grid-template-columns: 1fr;
}
}
</style>
</head>

<body>

<header>
Bumbu Babah Admin Dashboard
</header>

<div class="nav">
<button onclick="go('statistics')">Statistics</button>
<button onclick="go('menu')">Menu</button>
<button onclick="go('review')">Reviews</button>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card" id="statistics">
<h2>Business Statistics 📊</h2>

<div class="stats">
<div class="stat">
<h1 id="menuTotal">0</h1>
<p>Menu</p>
</div>
<div class="stat">
<h1 id="orderTotal">0</h1>
<p>Orders</p>
</div>
<div class="stat">
<h1 id="revenue">RM0</h1>
<p>Revenue</p>
</div>
<div class="stat">
<h1 id="reviewTotal">0</h1>
<p>Reviews</p>
</div>
</div>

<br>

<div class="stats">
<div class="stat">
<h1 id="todayOrder">0</h1>
<p>Today Orders</p>
</div>
<div class="stat">
<h1 id="totalItem">0</h1>
<p>Total Items Sold</p>
</div>
<div class="stat">
<h1 id="avgOrder">RM0</h1>
<p>Average Order</p>
</div>
<div class="stat">
<h1 id="bestMenu">-</h1>
<p>Popular Menu</p>
</div>
</div>

<div class="chart-container">
<h3>Analytics Performance 📈</h3>
<div class="chart-filters">
<button id="btn-day" class="active" onclick="changeFilter('day')">Day</button>
<button id="btn-week" onclick="changeFilter('week')">Week</button>
<button id="btn-month" onclick="changeFilter('month')">Month</button>
<button id="btn-year" onclick="changeFilter('year')">Year</button>
</div>
<div class="chart-grid">
<div class="chart-box">
<div class="chart-title">Revenue (RM)</div>
<div class="custom-chart" id="revenueChartBox"></div>
</div>
<div class="chart-box">
<div class="chart-title">Total Orders</div>
<div class="custom-chart" id="ordersChartBox"></div>
</div>
</div>
</div>

</div>

<div class="card" id="menu">
<h2>Menu Management 🍛</h2>
<input id="name" placeholder="Food name">
<input id="price" placeholder="Price">
<input id="category" placeholder="Category">
<button class="action" onclick="addMenu()">Add Menu</button>
<div id="menuList"></div>
</div>

<div class="card" id="review">
<h2>Customer Reviews ⭐</h2>
<h3>Average: <span id="average">0</span></h3>
<div id="reviewList"></div>
</div>

</div>

<script>
// SECURITY
if(localStorage.getItem("userRole") !== "admin"){
alert("Access denied!");
location.href="index.html";
}

let menu = JSON.parse(localStorage.getItem("menuData"))||[];
let currentActiveFilter = 'day';

function addMenu(){
let n = document.getElementById("name").value;
let p = document.getElementById("price").value;
let c = document.getElementById("category").value;

if(!n||!p) return alert("Fill all");

menu.push({ name:n, price:Number(p), category:c });
localStorage.setItem("menuData", JSON.stringify(menu));

// Kosongkan semula ruangan input selepas berjaya tambah menu
document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("category").value = "";

loadAll();
}

function deleteMenu(i){
if(confirm("Are you sure you want to delete this item?")) {
menu.splice(i,1);
localStorage.setItem("menuData", JSON.stringify(menu));
loadAll();
}
}

/* ================= FUNGSI KEMAS KINI (UPDATE) MENU ================= */

// Fungsi untuk menukar teks menu kepada bentuk input form
function editMenuMode(i) {
    let itemDiv = document.getElementById(`menu-item-${i}`);
    let m = menu[i];

    itemDiv.innerHTML = `
        <input type="text" class="edit-input" id="edit-name-${i}" value="${m.name}" style="width: 40%">
        RM <input type="number" class="edit-input" id="edit-price-${i}" value="${m.price}" style="width: 20%">
        (<input type="text" class="edit-input" id="edit-cat-${i}" value="${m.category}" style="width: 25%">)
        <div class="menu-actions">
            <button class="btn-save" onclick="saveMenuUpdate(${i})">Save</button>
            <button style="background:#6c757d;" onclick="loadMenu()">Cancel</button>
        </div>
    `;
}

// Fungsi untuk menyimpan perubahan data ke dalam LocalStorage
function saveMenuUpdate(i) {
    let newName = document.getElementById(`edit-name-${i}`).value;
    let newPrice = document.getElementById(`edit-price-${i}`).value;
    let newCat = document.getElementById(`edit-cat-${i}`).value;

    if(!newName || !newPrice) return alert("Name and price cannot be empty!");

    // Kemaskini data array utama
    menu[i].name = newName;
    menu[i].price = Number(newPrice);
    menu[i].category = newCat;

    // Simpan ke LocalStorage
    localStorage.setItem("menuData", JSON.stringify(menu));
    
    loadAll();
}

/* =================================================================== */

function loadMenu(){
let box = document.getElementById("menuList");
box.innerHTML="";

menu.forEach((m,i)=>{
box.innerHTML+=`
<div class="item" id="menu-item-${i}">
    <b>${m.name}</b> - RM${m.price} (${m.category})
    <div class="menu-actions">
        <button class="btn-edit" onclick="editMenuMode(${i})">Edit</button>
        <button class="btn-delete" onclick="deleteMenu(${i})">Delete</button>
    </div>
</div>
`;
});
}

function loadReviews(){
let r = JSON.parse(localStorage.getItem("reviews"))||[];
let box = document.getElementById("reviewList");
box.innerHTML="";
let total=0;

r.forEach(x=>{
total+=x.rating;
box.innerHTML+=`
<div class="item">
<b>${x.customer}</b><br>
${"⭐".repeat(x.rating)}<br>
${x.comment}
</div>
`;
});

document.getElementById("reviewTotal").innerHTML=r.length;
document.getElementById("average").innerHTML= r.length ? (total/r.length).toFixed(1) : 0;
}

function statistics(){
menu = JSON.parse(localStorage.getItem("menuData")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

document.getElementById("menuTotal").innerHTML = menu.length;
document.getElementById("orderTotal").innerHTML = orders.length;

let money = 0;
orders.forEach(o=>{ money += Number(o.total); });
document.getElementById("revenue").innerHTML = "RM"+money;

let totalItem = 0;
let countMenu = {};

orders.forEach(o=>{
if(o.items){
o.items.forEach(i=>{
totalItem += Number(i.qty || 1);
countMenu[i.name] = (countMenu[i.name]||0)+1;
});
}
});

document.getElementById("todayOrder").innerHTML = orders.length;
document.getElementById("totalItem").innerHTML = totalItem;
document.getElementById("avgOrder").innerHTML = orders.length ? "RM"+(money/orders.length).toFixed(2) : "RM0";

let popular="-";
let max=0;
for(let x in countMenu){
if(countMenu[x]>max){
max=countMenu[x];
popular=x;
}
}
document.getElementById("bestMenu").innerHTML = popular;
}

// ================= LOGIK GRAF (MENGGUNAKAN DATA REAL DARI LOCALSTORAGE) =================

function getRealChartData(filter) {
    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let labels = [];
    let revenueData = [];
    let ordersData = [];

    if (filter === 'day') {
        labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        revenueData = [0, 0, 0, 0, 0, 0, 0];
        ordersData = [0, 0, 0, 0, 0, 0, 0];

        orders.forEach(o => {
            if (o.date) {
                let d = new Date(o.date);
                let dayIndex = d.getDay();
                let adjustedIndex = dayIndex === 0 ? 6 : dayIndex - 1;
                if(adjustedIndex >= 0 && adjustedIndex < 7) {
                    revenueData[adjustedIndex] += Number(o.total || 0);
                    ordersData[adjustedIndex] += 1;
                }
            }
        });
    } 
    else if (filter === 'week') {
        labels = ['Week 1', 'Week 2', 'Week 3', 'Week 4'];
        revenueData = [0, 0, 0, 0];
        ordersData = [0, 0, 0, 0];

        orders.forEach(o => {
            if (o.date) {
                let d = new Date(o.date);
                let dateNum = d.getDate();
                let weekIndex = Math.floor((dateNum - 1) / 7);
                if(weekIndex > 3) weekIndex = 3;
                revenueData[weekIndex] += Number(o.total || 0);
                ordersData[weekIndex] += 1;
            }
        });
    } 
    else if (filter === 'month') {
        labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        revenueData = Array(12).fill(0);
        ordersData = Array(12).fill(0);

        orders.forEach(o => {
            if (o.date) {
                let d = new Date(o.date);
                let monthIndex = d.getMonth();
                revenueData[monthIndex] += Number(o.total || 0);
                ordersData[monthIndex] += 1;
            }
        });
    } 
    else if (filter === 'year') {
        let currentYear = new Date().getFullYear();
        labels = [(currentYear - 2).toString(), (currentYear - 1).toString(), currentYear.toString()];
        revenueData = [0, 0, 0];
        ordersData = [0, 0, 0];

        orders.forEach(o => {
            if (o.date) {
                let d = new Date(o.date);
                let y = d.getFullYear().toString();
                let yearIndex = labels.indexOf(y);
                if (yearIndex !== -1) {
                    revenueData[yearIndex] += Number(o.total || 0);
                    ordersData[yearIndex] += 1;
                }
            }
        });
    }

    return { labels, revenue: revenueData, orders: ordersData };
}

function renderCustomCharts(filter) {
    currentActiveFilter = filter;
    const revBox = document.getElementById('revenueChartBox');
    const ordBox = document.getElementById('ordersChartBox');

    if (!revBox || !ordBox) return;

    const liveData = getRealChartData(filter);
    const maxRevenue = Math.max(...liveData.revenue);
    const maxOrders = Math.max(...liveData.orders);

    let revHTML = '';
    liveData.labels.forEach((label, index) => {
        const val = liveData.revenue[index];
        const heightPercent = maxRevenue > 0 ? (val / maxRevenue) * 90 : 2; 
        revHTML += `
        <div class="bar-wrapper">
            <div class="bar revenue-bar" style="height: ${heightPercent}%">
                <span class="bar-value">RM${val.toFixed(0)}</span>
            </div>
            <div class="bar-label">${label}</div>
        </div>
        `;
    });
    revBox.innerHTML = revHTML;

    let ordHTML = '';
    liveData.labels.forEach((label, index) => {
        const val = liveData.orders[index];
        const heightPercent = maxOrders > 0 ? (val / maxOrders) * 90 : 2;
        ordHTML += `
        <div class="bar-wrapper">
            <div class="bar" style="height: ${heightPercent}%">
                <span class="bar-value">${val}</span>
            </div>
            <div class="bar-label">${label}</div>
        </div>
        `;
    });
    ordBox.innerHTML = ordHTML;
}

function changeFilter(filter) {
    document.querySelectorAll('.chart-filters button').forEach(btn => btn.classList.remove('active'));
    const targetBtn = document.getElementById(`btn-${filter}`);
    if(targetBtn) targetBtn.classList.add('active');
    renderCustomCharts(filter);
}

// =================================================================

function loadAll(){
    loadMenu();
    loadReviews();
    statistics();
    renderCustomCharts(currentActiveFilter); 
}

function go(id){
    document.getElementById(id).scrollIntoView({ behavior:"smooth" });
}

function logout(){
    localStorage.removeItem("userRole");
    location.href="index.html";
}

window.addEventListener('DOMContentLoaded', () => {
    loadAll();
});

// Sela masa untuk penyegaran statistik am (Graf ditiadakan dari fungsi auto-refresh auto-draw bagi mengelakkan gangguan ketika menaip edit)
setInterval(()=>{
    loadReviews();
    statistics();
},5000);

</script>

</body>
</html>
