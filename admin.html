<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

*{
  box-sizing:border-box;
  font-family:'Segoe UI',Arial,sans-serif;
}


body{

  margin:0;
  background:#f5f6fa;
  color:#222;

}


/* HEADER */

header{

  height:75px;

  background:
  linear-gradient(135deg,#111,#333);

  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:26px;
  font-weight:700;

  letter-spacing:1px;

  box-shadow:0 8px 25px rgba(0,0,0,.2);

}


/* DASHBOARD */

.container{

  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:25px;

  padding:30px;

}


/* CARD */

.box{

  background:white;

  padding:25px;

  border-radius:25px;

  box-shadow:
  0 15px 35px rgba(0,0,0,.08);

  border:1px solid #eee;

  transition:.3s ease;

}


.box:hover{

 transform:translateY(-5px);

 box-shadow:
 0 20px 45px rgba(0,0,0,.12);

}



.box h2{

 margin-top:0;

 color:#111;

}


/* INPUT */

input{

 width:100%;

 padding:14px;

 margin:8px 0;

 border-radius:12px;

 border:1px solid #ddd;

 outline:none;

 font-size:15px;

 transition:.2s;

}


input:focus{

 border-color:#ff5a1f;

 box-shadow:0 0 0 3px rgba(255,90,31,.15);

}

.admin-nav{

display:flex;

justify-content:center;

gap:15px;

padding:20px;

background:#fff;

box-shadow:0 5px 15px rgba(0,0,0,.08);

position:sticky;

top:0;

z-index:10;

}


.admin-nav button{

width:auto;

padding:10px 22px;

border-radius:999px;

background:#111;

color:white;

transition:.3s;

}


.admin-nav button:hover{

background:#ff5a1f;

transform:translateY(-3px);

}





/* BUTTON */


button{

 width:100%;

 padding:12px;

 border:none;

 border-radius:12px;

 cursor:pointer;

 font-weight:600;

 transition:.25s;

}


button:hover{

 transform:translateY(-2px);

}



.add-btn{

 background:#111;

 color:white;

}


.add-btn:hover{

 background:#ff5a1f;

}



.edit-btn{

 background:#ff9800;

 color:white;

}



.delete-btn{

 background:#e53935;

 color:white;

 margin-top:10px;

}


/* MENU ITEM */


.item{

 background:#fafafa;

 margin:12px 0;

 padding:15px;

 border-radius:15px;

 border-left:5px solid #ff5a1f;

 transition:.2s;

}



.item:hover{

 background:#fff4ee;

 transform:translateX(5px);

}



/* REVIEW */


#avgRating{

 color:#ff9800;

 font-size:25px;

 font-weight:bold;

}


#totalReviews{

 color:#ff5a1f;

 font-weight:bold;

}


/* ORDER */

#orderList .item{

 border-left-color:#22c55e;

}


/* SCROLL */

.box::-webkit-scrollbar{

 width:8px;

}


.box::-webkit-scrollbar-thumb{

 background:#ff5a1f;

 border-radius:20px;

}


/* RESPONSIVE */


@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}


</style>
</head>

<body>

<header>
Bumbu Babah Staff Dashboard
</header>

<nav class="admin-nav">

<button onclick="scrollToSection('reviews')">
 Reviews
</button>

<button onclick="scrollToSection('menu')">
 Menu
</button>

<button onclick="scrollToSection('orders')">
Live Orders
</button>

</nav>

<div class="container">
<div class="box" id="reviews">

<h2>Customer Reviews ⭐</h2>

  <p>
    Average Rating:
    <span id="avgRating">0</span> ⭐
  </p>

  <p>
    Total Reviews:
    <span id="totalReviews">0</span>
  </p>

  <div id="reviewList"></div>
</div>

<!-- MENU MANAGEMENT -->
<div class="box" id="menu">
<h2>Menu Management</h2>

<input id="name" placeholder="Item name">
<input id="price" placeholder="Price">
<input id="category" placeholder="Category (rice/chicken/etc)">

<button class="add-btn" onclick="addItem()">Add Menu</button>

<hr>

<div id="menuList"></div>
</div>

<!-- LIVE ORDERS -->
<div class="box" id="orders">
<h2>Live Orders 🔴</h2>
<div id="orderList"></div>
<button class="delete-btn" onclick="clearOrders()">
  Clear All Orders
</button>
</div>

</div>

<script>

let menu = JSON.parse(localStorage.getItem("menuData")) || [];

if(menu.length === 0){
  menu = [
    {name:"Nasi Putih", price:3, category:"rice"},
    {name:"Nasi Lemak Padang", price:5, category:"rice"},
    {name:"Nasi Kerabu Janda 3 Rasa", price:8, category:"rice"},

    {name:"Ayam Rendang", price:12, category:"chicken"},
    {name:"Ayam Pop", price:11, category:"chicken"},
    {name:"Ayam Gulai", price:10, category:"chicken"},
    {name:"Ayam Goreng", price:7, category:"chicken"},

    {name:"Daging Rendang", price:15, category:"beef"},
    {name:"Daging Gulai", price:12, category:"beef"},
    {name:"Daging Dendeng", price:10, category:"beef"},
    {name:"Wagyu A5 Miyazaki", price:67, category:"beef"},

    {name:"Ikan Bakar", price:14, category:"seafood"},
    {name:"Ikan Gulai", price:12, category:"seafood"},
    {name:"Ikan Steam", price:15, category:"seafood"},

    {name:"Kangkung Belacan", price:7, category:"vegetables"},
    {name:"Sayur Nangka", price:7, category:"vegetables"},
    {name:"Terung Balado", price:6, category:"vegetables"},
    {name:"Tempe Goreng", price:5, category:"vegetables"},

    {name:"Teh Ais", price:3, category:"drink"},
    {name:"Kopi Ais", price:3, category:"drink"},
    {name:"Milo Ais", price:5, category:"drink"},

    {name:"Cendol", price:6, category:"dessert"},
    {name:"Ais Kacang", price:6, category:"dessert"},
  ];

  localStorage.setItem("menuData", JSON.stringify(menu));
}

let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* SAVE MENU */
function saveMenu(){
  localStorage.setItem("menuData", JSON.stringify(menu));
}

/*CLEAR ORDER*/
function clearOrders(){

  let confirmDelete = confirm("Are you sure want to delete ALL orders?");

  if(!confirmDelete) return;

  localStorage.removeItem("orders");

  renderOrders();

  alert("All orders cleared!");
}

/* ADD ITEM */
function addItem(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let category = document.getElementById("category").value || "other";

  if(!name || !price) return alert("Fill all fields");

  menu.push({name, price, category});
  saveMenu();
  renderMenu();
}

/* DELETE */
function deleteItem(index){
  menu.splice(index,1);
  saveMenu();
  renderMenu();
}

/* RENDER MENU */
function renderMenu(){
  let box = document.getElementById("menuList");
  box.innerHTML = "";

  menu.forEach((item,index)=>{
    box.innerHTML += `
      <div class="item">
        <b>${item.name}</b> (${item.category || "other"}) - RM${item.price}
        <button class="delete-btn" onclick="deleteItem(${index})">Delete</button>
      </div>
    `;
  });
}

/* LIVE ORDERS */
function renderOrders(){
  orders = JSON.parse(localStorage.getItem("orders")) || [];

  let box = document.getElementById("orderList");
  box.innerHTML = "";

  if(orders.length === 0){
    box.innerHTML = "<p>No orders yet</p>";
    return;
  }

  orders.forEach((order,index)=>{
    box.innerHTML += `
      <div class="item">
        <b>Customer:</b> ${order.name}<br>
        <b>Total:</b> RM${order.total}<br>
        <b>Items:</b><br>
        ${order.items.map(i=>`- ${i.name} x${i.qty}`).join("<br>")}
        <br><br>
        <small>${order.date}</small>
      </div>
    `;
  });
}

function deleteReview(index){

  let reviews =
    JSON.parse(localStorage.getItem("reviews")) || [];

  reviews.splice(index,1);

  localStorage.setItem(
    "reviews",
    JSON.stringify(reviews)
  );

  renderReviews();

}

function renderReviews(){

  let reviews =
    JSON.parse(localStorage.getItem("reviews")) || [];

  let box =
    document.getElementById("reviewList");

  if(!box) return;

  box.innerHTML = "";

  document.getElementById("totalReviews").innerText =
    reviews.length;

  let totalRating = 0;

  reviews.forEach((review,index)=>{

    totalRating += review.rating;

    box.innerHTML += `
      <div class="item">

        <b>${review.customer}</b>

        <br>

        Rating:
        ${"⭐".repeat(review.rating)}

        <br>

        ${review.comment}

        <br>

        <small>${review.date}</small>

        <button
          class="delete-btn"
          onclick="deleteReview(${index})">

          Delete

        </button>

      </div>
    `;

  });

  let average =
    reviews.length > 0
      ? (totalRating / reviews.length).toFixed(1)
      : 0;

  document.getElementById("avgRating").innerText =
    average;

}

function scrollToSection(id){

document
.getElementById(id)
.scrollIntoView({
behavior:"smooth"
});

}

/* AUTO REFRESH LIVE ORDERS */
setInterval(renderOrders, 2000);

renderMenu();
renderOrders();
renderReviews();

</script>

</body>
</html>
