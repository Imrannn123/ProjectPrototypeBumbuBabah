<!DOCTYPE html>
<html>
<head>

<title>Bumbu Babah Instagram</title>

<style>

body{
font-family:Arial;
background:#fafafa;
margin:0;
}

.header{
background:white;
padding:20px;
font-size:30px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.profile{
padding:40px;
display:flex;
gap:30px;
align-items:center;
}

.logo{
width:120px;
height:120px;
background:#ff5a1f;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
}

.posts{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:30px;
}

.post{
height:250px;
background:#ddd;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
}

</style>

</head>

<body>


<div class="header">
📸 Instagram
</div>


<div class="profile">

<div class="logo">
🍛
</div>

<div>

<h1>Bumbu Babah</h1>

<p>
Authentic Malaysian food 🍽️
</p>

<p>
Followers: 12.5M
</p>

</div>

</div>


<div class="posts">

<div class="post">🍚</div>
<div class="post">🍗</div>
<div class="post">🍧</div>
<div class="post">🔥</div>
<div class="post">⭐</div>
<div class="post">🥘</div>


</div>


</body>
</html>
